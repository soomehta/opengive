name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'apps/docs/**'
      - 'packages/**'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm turbo lint

      - name: Run tests
        run: pnpm turbo test

      - name: Build all
        run: pnpm turbo build

  deploy-frontend:
    name: Deploy Frontend to Vercel (Production)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment:
      name: production
      url: https://opengive.org

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm turbo build --filter=web

      - name: Deploy to Vercel (Production)
        uses: vercel/action@v5
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          projectId: ${{ secrets.VERCEL_PROJECT_ID }}
          orgId: ${{ secrets.VERCEL_ORG_ID }}
          args: --prod --prebuilt
          scope: ${{ secrets.VERCEL_ORG_ID }}

  deploy-docs:
    name: Deploy Docs to Vercel (Production)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment:
      name: production
      url: https://docs.opengive.org

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter=@opengive/docs build

      - name: Deploy docs to Vercel
        uses: vercel/action@v5
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          projectId: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
          orgId: ${{ secrets.VERCEL_ORG_ID }}
          args: apps/docs --prod --prebuilt
          scope: ${{ secrets.VERCEL_ORG_ID }}

  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.opengive.org

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railway-app/cli-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: api
          environment: production

  deploy-ml-api:
    name: Deploy ML API to Railway
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    environment:
      name: production
      url: https://ml.opengive.org

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railway-app/cli-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ml-api
          environment: production

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-docs, deploy-api, deploy-ml-api]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy-frontend.result }}" = "success" ] && \
             [ "${{ needs.deploy-docs.result }}" = "success" ] && \
             [ "${{ needs.deploy-api.result }}" = "success" ] && \
             [ "${{ needs.deploy-ml-api.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=All production services deployed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Production deployment failed. Check logs." >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.message }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status*\n\nCommit: ${{ github.event.head_commit.message }}\nAuthor: ${{ github.event.head_commit.author.name }}\n\nFrontend: ${{ needs.deploy-frontend.result }}\nDocs: ${{ needs.deploy-docs.result }}\nAPI: ${{ needs.deploy-api.result }}\nML API: ${{ needs.deploy-ml-api.result }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Set deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: status,
              description: '${{ steps.status.outputs.message }}',
              auto_merge: false,
              environment_url: 'https://opengive.org'
            });
