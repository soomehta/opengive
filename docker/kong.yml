_format_version: "1.1"

###############################################################################
# OpenGive — Kong declarative config (local development only)
#
# This is the API gateway config used by the Kong container in docker-compose.
# It mirrors the routing that Supabase Cloud uses so that clients talking to
# http://localhost:54321 behave the same as when talking to the hosted project.
#
# Routes:
#   /rest/v1/*    → PostgREST  (http://rest:3000)
#   /auth/v1/*    → GoTrue     (http://auth:9999)
#   /storage/v1/* → Storage    (http://storage:5000)
#   /realtime/*   → (stub — not used in local dev Phase 1)
###############################################################################

services:
  ##############################################################################
  # PostgREST — auto-generated REST API on top of PostgreSQL
  ##############################################################################
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:3001"
          methods:
            - GET
            - POST
            - PATCH
            - PUT
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Accept-Profile
            - Accept-Language
            - Authorization
            - Content-Profile
            - Content-Type
            - Prefer
            - X-Client-Info
          exposed_headers:
            - Content-Range
            - X-Total-Count
          credentials: true
          max_age: 3600

  ##############################################################################
  # GoTrue — Supabase Auth service
  ##############################################################################
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:3001"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Client-Info
            - X-Supabase-Api-Version
          credentials: true
          max_age: 3600

  ##############################################################################
  # Storage API
  ##############################################################################
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:3001"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Authorization
            - Cache-Control
            - Content-Type
            - X-Client-Info
            - X-Upsert
          exposed_headers:
            - ETag
          credentials: true
          max_age: 3600
